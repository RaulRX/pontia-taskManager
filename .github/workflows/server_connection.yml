name: Test server connection

on:
  workflow_dispatch:
   
jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: show docker images
        uses: favware/ssh-remote-action@v1
        with:
          host: ${{ secrets.TFM_SERVER_HOST }}
          port: 22
          key: ${{ secrets.TFM_SERVER_PKEY }}
          username: ${{ secrets.TFM_SERVER_USER }}
          command: docker images
  
          