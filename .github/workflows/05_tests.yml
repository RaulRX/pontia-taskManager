name: Tests (Python)
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show github repo
        run: echo "La carpeta de trabajo es $GITHUB_WORKSPACE"
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Instalar dependencias
        run: |
          pip install -r ./requirements.txt
           # Check if pytest is installed
          if $(python -c "import pytest" 2> /dev/null | echo $?) == 0; then
            echo "pytest is installed"
          else
            echo "pytest is not installed. Proceeding to install ..."
            pip install pytest
          fi

          # check pytest installation
          echo "Pytest version: $(pytest --version)" 
      
      - name: Ejecutar tests
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$WORKSPACE/src"

          # Check if pytest is installed
          if $(python -c "import pytest" | echo $?) == 0; then
            echo "pytest is installed"
          
            else
            echo "pytest is not installed. Proceeding to install ..."
            pip install pytest
          
          pytest tests/test_operations.py