name: Tests (Python)
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show github repo
        run: echo "La carpeta de trabajo es $GITHUB_WORKSPACE"
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Instalar dependencias
        run: |
          pip install -r ./requirements.txt
           # Check if pytest is installed
      
      - name: Ejecutar tests
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$WORKSPACE/src"
          # Terminal 1: levantar la API
          echo "Levantamos la API para ejecutar los tests"
          python -m src.taskmanager.main

          # Terminal 2: ejecutar tests
          echo "Ejecutamos los tests"
          python -m tests.test_python