services:
  postgres:
    container_name: postgresDB
    image: postgres:15-alpine
    restart: unless-stopped
    secrets:
      - postgres_user
      - postgres_password
      - postgres_database
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_database
    networks:
      - net-taskmanager
    ports:
      - 5432:5432
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TaskManager"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  taskmanager:
    container_name: task-manager
    build: 
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_user
      - postgres_password
      - postgres_host
      - postgres_database
    environment:
      POSTGRES_HOST: /run/secrets/postgres_host
      POSTGRES_USER: /run/secrets/postgres_user
      POSTGRES_PASSWORD: /run/secrets/postgres_password
      POSTGRES_PORT: 5432
      POSTGRES_DB: /run/secrets/postgres_database
      POSTGRES_DB_TABLE: Note
      LOG_LEVEL: info
    ports:
      - 8080:8000
    networks:
      - net-taskmanager
    volumes:
      - postgres_db:/var/lib/postgresql/data
    
volumes:
  postgres_db:

networks:
  net-taskmanager:

secrets:
  postgres_user:
    file: ../src/taskmanager/infrastructure/env/postgres_user.txt
  postgres_password:
    file: ../src/taskmanager/infrastructure/env/postgres_password.txt
  postgres_host:
    file: ../src/taskmanager/infrastructure/env/postgres_host.txt
  postgres_database:
    file: ../src/taskmanager/infrastructure/env/postgres_database.txt